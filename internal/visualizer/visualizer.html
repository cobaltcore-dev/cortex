<!DOCTYPE html>
<html>
  <head>
    <title>Cortex Visualizer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <style>
      body {
        background: rgb(244, 247, 249);
        min-width: 100vw;
        min-height: 100vh;
      }
      .weightcell-bg {
        background: white;
        margin: 2px;
        height: 30px;
        width: 30px;
        display: inline-block;
        border-radius: 8px;
      }
      .weightcell-fg {
        border-radius: 6px;
        height: 100%;
        width: 100%;
        transition: background 0.5s, color 0.5s;
      }
      main {
        display: inline-block;
      }
      .host-name {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        text-align: center;
        width: 30px;
        margin: 2px;
        display: inline-block;
        background: white;
        border-radius: 8px;
        padding: 2px;
      }
    </style>
  </head>
  <body>
    <section id="app" class="py-6 px-6"></section>

    <script>
      let time = null;
      async function update() {
        const resp = await fetch('http://localhost:8004/scheduler-telemetry.json');
        const data = await resp.json();
        if (data.time == time) return;
        time = data.time;

        let hosts = [];
        for (const host of data.request.hosts) {
          hosts.push(host.host);
        }
        hosts.sort();

        let content = `
          <div>
            <p class="subtitle py-3 mr-5"><b>Scheduler Steps</b></p>
          </div>
        `;
        for (const stepName of data.order) {
          const weights = data.steps[stepName];
          content += `
            <div class="sidebar">
              <p class="subtitle py-3 mr-5">${stepName}</p>
            </div>
            <main>`;
          for (const host of hosts) {
            const weight = weights[host];
            const norm = Math.min(1, Math.max(0, (weight + 1) / 2));
            let color = `rgba(255, 0, 0, ${1 - (norm * 2)})`;
            if (norm > 0.5) {
              color = `rgba(0, 255, 0, ${(norm - 0.5) * 2})`;
            }
            let textcolor = 'black';
            if (norm > 0.75 || norm < 0.25) {
              textcolor = 'white';
            }
            content += `
            <div class="weightcell-bg p-0">
              <div
                class="weightcell-fg p-2"
                style="background: ${color}; color: ${textcolor};"
              ></div>
            </div>
            `;
          }
          content += `
            </main>
          `;
        }
        content += `
          <div class="py-3"></div>
        `;
        for (const host of hosts) {
          content += `
            <div class="host-name">${host}</div>
          `;
        }
        document.getElementById('app').innerHTML = content;
      }
      update();
      setInterval(update, 1000);
    </script>
  </body>
</html>
