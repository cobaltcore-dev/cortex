apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cortex-postgres.fullname" . }}-cleanup
  labels:
    {{- include "cortex-postgres.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
    helm.sh/hook-weight: "-5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cortex-postgres.fullname" . }}-cleanup
  labels:
    {{- include "cortex-postgres.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
    helm.sh/hook-weight: "-5"
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["list", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services", "configmaps", "secrets"]
    verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cortex-postgres.fullname" . }}-cleanup
  labels:
    {{- include "cortex-postgres.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
    helm.sh/hook-weight: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cortex-postgres.fullname" . }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "cortex-postgres.fullname" . }}-cleanup
    namespace: {{ .Release.Namespace }}
