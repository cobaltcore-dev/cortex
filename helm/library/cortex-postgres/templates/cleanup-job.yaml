apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cortex-postgres.fullname" . }}-cleanup
  labels:
    {{- include "cortex-postgres.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-upgrade
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed
    helm.sh/hook-weight: "0"
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: {{ include "cortex-postgres.fullname" . }}-cleanup
    spec:
      serviceAccountName: {{ include "cortex-postgres.fullname" . }}-cleanup
      restartPolicy: Never
      containers:
        - name: cleanup
          image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              CURRENT_STS="{{ include "cortex-postgres.versionedFullname" . }}"
              CURRENT_SVC="{{ include "cortex-postgres.versionedFullname" . }}"
              CURRENT_CM="{{ include "cortex-postgres.versionedFullname" . }}-max-conns"
              CURRENT_SECRET="{{ include "cortex-postgres.versionedFullname" . }}-secret"
              NAMESPACE="{{ .Release.Namespace }}"
              SELECTOR="app.kubernetes.io/name={{ include "cortex-postgres.name" . }},app.kubernetes.io/instance={{ .Release.Name }}"

              echo "Current version: $CURRENT_STS"
              echo "Looking for stale resources with selector: $SELECTOR"

              # Clean up old StatefulSets
              kubectl get statefulsets -n "$NAMESPACE" -l "$SELECTOR" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | while read -r name; do
                if [ -n "$name" ] && [ "$name" != "$CURRENT_STS" ]; then
                  echo "Deleting stale StatefulSet: $name"
                  kubectl delete statefulset "$name" -n "$NAMESPACE" --ignore-not-found
                  kubectl delete pvc "data-${name}-0" -n "$NAMESPACE" --ignore-not-found
                fi
              done

              # Clean up old Services
              kubectl get services -n "$NAMESPACE" -l "$SELECTOR" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | while read -r name; do
                if [ -n "$name" ] && [ "$name" != "$CURRENT_SVC" ]; then
                  echo "Deleting stale Service: $name"
                  kubectl delete service "$name" -n "$NAMESPACE" --ignore-not-found
                fi
              done

              # Clean up old ConfigMaps
              kubectl get configmaps -n "$NAMESPACE" -l "$SELECTOR" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | while read -r name; do
                if [ -n "$name" ] && [ "$name" != "$CURRENT_CM" ]; then
                  echo "Deleting stale ConfigMap: $name"
                  kubectl delete configmap "$name" -n "$NAMESPACE" --ignore-not-found
                fi
              done

              # Clean up old Secrets
              kubectl get secrets -n "$NAMESPACE" -l "$SELECTOR" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | while read -r name; do
                if [ -n "$name" ] && [ "$name" != "$CURRENT_SECRET" ]; then
                  echo "Deleting stale Secret: $name"
                  kubectl delete secret "$name" -n "$NAMESPACE" --ignore-not-found
                fi
              done

              echo "Cleanup complete."
