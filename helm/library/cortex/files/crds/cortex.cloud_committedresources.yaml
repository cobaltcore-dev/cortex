    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CommittedResource is the Schema for the committedresources API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CommittedResourceSpec defines the desired state of CommittedResource,
            properties:
              allowRejection:
                description: |-
                  AllowRejection controls what the CommittedResource controller does when placement fails
                  for a guaranteed or confirmed commitment.
                  true  — controller may reject: on failure, child Reservations are rolled back and the CR
                          is marked Rejected. Use this when the caller is making a first-time placement
                          decision and a "no" answer is acceptable (e.g. the change-commitments API).
                  false — controller must retry: on failure, existing child Reservations are kept and the
                          CR is set to Reserving so the controller retries later. Use this when the caller
                          is restoring already-committed state that Cortex must honour (e.g. the syncer).
                  Only meaningful for state=guaranteed or state=confirmed; ignored for all other states.
                type: boolean
              amount:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  Amount is the total committed quantity.
                  memory: MiB expressed in K8s binary SI notation (e.g. "1280Gi", "640Mi").
                  cores: integer core count (e.g. "40").
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              availabilityZone:
                description: AvailabilityZone specifies the availability zone for
                  this commitment.
                type: string
              commitmentUUID:
                description: UUID of the commitment this resource corresponds to.
                type: string
              confirmedAt:
                description: ConfirmedAt is when the commitment was confirmed.
                format: date-time
                type: string
              domainID:
                description: DomainID of the OpenStack domain this commitment belongs
                  to.
                type: string
              endTime:
                description: EndTime is when Reservation slots expire. Nil for unbounded
                  commitments with no expiry.
                format: date-time
                type: string
              flavorGroupName:
                description: FlavorGroupName identifies the flavor group this commitment
                  targets, e.g. "kvm_v2_hana_s".
                type: string
              projectID:
                description: ProjectID of the OpenStack project this commitment belongs
                  to.
                type: string
              resourceType:
                description: 'ResourceType identifies the kind of resource committed:
                  memory drives Reservation slots; cores uses an arithmetic check
                  only.'
                enum:
                - memory
                - cores
                type: string
              schedulingDomain:
                description: SchedulingDomain specifies the scheduling domain for
                  this committed resource (e.g., "nova", "ironcore").
                type: string
              startTime:
                description: |-
                  StartTime is the activation time for Reservation slots.
                  Nil for guaranteed commitments (slots are active from creation); set to ConfirmedAt for confirmed ones.
                format: date-time
                type: string
              state:
                description: State is the lifecycle state of the commitment.
                enum:
                - planned
                - pending
                - guaranteed
                - confirmed
                - superseded
                - expired
                type: string
            required:
            - amount
            - availabilityZone
            - commitmentUUID
            - domainID
            - flavorGroupName
            - projectID
            - resourceType
            - state
            type: object
          status:
            description: CommittedResourceStatus defines the observed state of CommittedResource.
            properties:
              acceptedAt:
                description: AcceptedAt is when the controller last successfully reconciled
                  the spec into Reservation slots.
                format: date-time
                type: string
              acceptedSpec:
                description: |-
                  AcceptedSpec is a snapshot of Spec from the last successful reconcile.
                  Used by rollbackToAccepted to restore the exact previously-accepted placement (AZ, amount,
                  project, domain, flavor group) even when the current spec has already been mutated to a new value.
                properties:
                  allowRejection:
                    description: |-
                      AllowRejection controls what the CommittedResource controller does when placement fails
                      for a guaranteed or confirmed commitment.
                      true  — controller may reject: on failure, child Reservations are rolled back and the CR
                              is marked Rejected. Use this when the caller is making a first-time placement
                              decision and a "no" answer is acceptable (e.g. the change-commitments API).
                      false — controller must retry: on failure, existing child Reservations are kept and the
                              CR is set to Reserving so the controller retries later. Use this when the caller
                              is restoring already-committed state that Cortex must honour (e.g. the syncer).
                      Only meaningful for state=guaranteed or state=confirmed; ignored for all other states.
                    type: boolean
                  amount:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      Amount is the total committed quantity.
                      memory: MiB expressed in K8s binary SI notation (e.g. "1280Gi", "640Mi").
                      cores: integer core count (e.g. "40").
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  availabilityZone:
                    description: AvailabilityZone specifies the availability zone
                      for this commitment.
                    type: string
                  commitmentUUID:
                    description: UUID of the commitment this resource corresponds
                      to.
                    type: string
                  confirmedAt:
                    description: ConfirmedAt is when the commitment was confirmed.
                    format: date-time
                    type: string
                  domainID:
                    description: DomainID of the OpenStack domain this commitment
                      belongs to.
                    type: string
                  endTime:
                    description: EndTime is when Reservation slots expire. Nil for
                      unbounded commitments with no expiry.
                    format: date-time
                    type: string
                  flavorGroupName:
                    description: FlavorGroupName identifies the flavor group this
                      commitment targets, e.g. "kvm_v2_hana_s".
                    type: string
                  projectID:
                    description: ProjectID of the OpenStack project this commitment
                      belongs to.
                    type: string
                  resourceType:
                    description: 'ResourceType identifies the kind of resource committed:
                      memory drives Reservation slots; cores uses an arithmetic check
                      only.'
                    enum:
                    - memory
                    - cores
                    type: string
                  schedulingDomain:
                    description: SchedulingDomain specifies the scheduling domain
                      for this committed resource (e.g., "nova", "ironcore").
                    type: string
                  startTime:
                    description: |-
                      StartTime is the activation time for Reservation slots.
                      Nil for guaranteed commitments (slots are active from creation); set to ConfirmedAt for confirmed ones.
                    format: date-time
                    type: string
                  state:
                    description: State is the lifecycle state of the commitment.
                    enum:
                    - planned
                    - pending
                    - guaranteed
                    - confirmed
                    - superseded
                    - expired
                    type: string
                required:
                - amount
                - availabilityZone
                - commitmentUUID
                - domainID
                - flavorGroupName
                - projectID
                - resourceType
                - state
                type: object
              assignedInstances:
                description: |-
                  AssignedInstances holds the UUIDs of VM instances deterministically assigned to this committed resource.
                  Populated by the usage reconciler; used to compute UsedResources and drive the quota controller.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions holds the current status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastChanged:
                description: |-
                  LastChanged is when the spec was last written by the syncer.
                  When AcceptedAt is older than LastChanged, the controller has pending work.
                format: date-time
                type: string
              lastReconcileAt:
                description: LastReconcileAt is when the controller last ran its reconcile
                  loop for this resource.
                format: date-time
                type: string
              lastUsageReconcileAt:
                description: LastUsageReconcileAt is when the usage reconciler last
                  updated AssignedInstances and UsedResources.
                format: date-time
                type: string
              usageObservedGeneration:
                description: |-
                  UsageObservedGeneration is the CR generation that the usage reconciler last processed.
                  Follows the Kubernetes observedGeneration pattern: when this differs from
                  metadata.generation the cooldown is bypassed so spec changes (e.g. shrink) are reflected
                  immediately rather than waiting for the next cooldown interval.
                format: int64
                type: integer
              usedResources:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  UsedResources is the total resource consumption of assigned VM instances, keyed by resource type
                  (e.g. "memory" in MiB binary SI, "cpu" as core count). Populated by the usage reconciler.
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
