      type: string
    - jsonPath: .status.usedResources.memory
      name: UsedMemory
      priority: 1
      type: string
    - jsonPath: .status.usedResources.cpu
      name: UsedCPU
      priority: 1
      type: string
    - jsonPath: .spec.state
      name: State
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.startTime
      name: StartTime
      priority: 1
