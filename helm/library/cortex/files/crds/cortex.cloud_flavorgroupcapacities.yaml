---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: flavorgroupcapacities.cortex.cloud
spec:
  group: cortex.cloud
  names:
    kind: FlavorGroupCapacity
    listKind: FlavorGroupCapacityList
    plural: flavorgroupcapacities
    singular: flavorgroupcapacity
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.flavorGroup
      name: FlavorGroup
      type: string
    - jsonPath: .spec.availabilityZone
      name: AZ
      type: string
    - jsonPath: .status.runningInstances
      name: Running
      type: integer
    - jsonPath: .status.lastReconcileAt
      name: LastReconcile
      type: date
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FlavorGroupCapacity caches pre-computed capacity data for one flavor group in one AZ.
          One CRD exists per (flavor group × AZ) pair, updated by the capacity controller on a fixed interval.
          The capacity API reads these CRDs instead of probing the scheduler on each request.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: FlavorGroupCapacitySpec defines the desired state of FlavorGroupCapacity.
            properties:
              availabilityZone:
                description: AvailabilityZone is the OpenStack AZ this capacity data
                  covers (e.g. "qa-de-1a").
                type: string
              flavorGroup:
                description: FlavorGroup is the name of the flavor group (e.g. "hana-v2").
                type: string
            required:
            - availabilityZone
            - flavorGroup
            type: object
          status:
            description: FlavorGroupCapacityStatus defines the observed state of FlavorGroupCapacity.
            properties:
              committedCapacity:
                description: |-
                  CommittedCapacity is the sum of AcceptedAmount across active CommittedResource CRDs,
                  expressed in multiples of the smallest flavor's memory.
                format: int64
                type: integer
              committedCapacityBytes:
                description: CommittedCapacityBytes is CommittedCapacity converted
                  to raw bytes.
                format: int64
                type: integer
              conditions:
                description: The current status conditions of the FlavorGroupCapacity.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              exclusivelyFreeCapacity:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  ExclusivelyFreeCapacity is the share of remaining resources fairly attributed to this
                  group by the round-robin capacity split. The sum across all groups for an AZ never
                  exceeds actual installed capacity.
                type: object
              exclusivelyFreeSlots:
                description: ExclusivelyFreeSlots is the number of smallest-flavor
                  VM slots available from ExclusivelyFreeCapacity.
                format: int64
                type: integer
              flavors:
                description: Flavors holds per-flavor capacity data for all flavors
                  in the group.
                items:
                  description: |-
                    FlavorCapacityStatus holds per-flavor scheduler probe results for one (flavor group × AZ) pair.
                    These values come directly from scheduler probes and are independent of the cross-group
                    capacity split (see FreeCapacity and ExclusivelyFreeCapacity on the parent status).
                    "Placeable" means: if all remaining capacity in this AZ were used solely by this flavor,
                    this is how many would fit. It does not account for competing flavor groups.
                  properties:
                    flavorName:
                      description: FlavorName is the OpenStack flavor name (e.g. "hana-v2-small").
                      type: string
                    placeableHosts:
                      description: PlaceableHosts is the number of hosts that can
                        still fit this flavor given current allocations.
                      format: int64
                      type: integer
                    placeableVms:
                      description: PlaceableVMs is the number of VM slots remaining
                        for this flavor given current allocations.
                      format: int64
                      type: integer
                    totalCapacityHosts:
                      description: TotalCapacityHosts is the number of eligible hosts
                        assuming an empty datacenter.
                      format: int64
                      type: integer
                    totalCapacityVmSlots:
                      description: TotalCapacityVMSlots is the maximum number of VM
                        slots assuming an empty datacenter.
                      format: int64
                      type: integer
                  required:
                  - flavorName
                  type: object
                type: array
              freeCapacity:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  FreeCapacity is the sum of remaining resources across all candidate hosts for this
                  group given current allocations. Because groups can share hosts, the sum across groups
                  may exceed actual installed capacity — this field reflects per-group availability
                  before any cross-group fairness split.
                type: object
              lastReconcileAt:
                description: LastReconcileAt is the timestamp of the last successful
                  reconcile.
                format: date-time
                type: string
              runningInstances:
                description: |-
                  RunningInstances is the number of VMs running in this (flavor group × AZ) whose
                  flavor belongs to this group.
                format: int64
                type: integer
              runningResources:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: RunningResources is the total resource consumption of
                  running VMs, keyed by resource type.
                type: object
              smallestFlavorName:
                description: |-
                  SmallestFlavorName is the name of the smallest flavor in this group, used as the
                  slot unit for ExclusivelyFreeSlots and related capacity fields.
                type: string
              totalCapacity:
                additionalProperties:
                  anyOf:
                  - type: integer
                  - type: string
                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                  x-kubernetes-int-or-string: true
                description: |-
                  TotalCapacity is the installed capacity across all eligible hosts in an empty-datacenter
                  scenario, expressed as raw resource amounts (bytes for memory, count for cores).
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
