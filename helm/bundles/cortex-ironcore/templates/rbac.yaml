apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.cortex.namePrefix }}-manager-role-ironcore
rules:
- apiGroups:
  - compute.ironcore.dev
  resources:
  - machineclasses
  - machinepools
  - machines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - compute.ironcore.dev
  resources:
  - machineclasses/finalizers
  - machinepools/finalizers
  - machines/finalizers
  verbs:
  - update
- apiGroups:
  - compute.ironcore.dev
  resources:
  - machineclasses/status
  - machinepools/status
  - machines/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.cortex.namePrefix }}-manager-rolebinding-ironcore
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.cortex.namePrefix }}-manager-role-ironcore
subjects:
- kind: ServiceAccount
  name: {{ .Values.cortex.namePrefix }}-controller-manager
  namespace: {{ .Release.Namespace }}
