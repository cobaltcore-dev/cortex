kind: Pipeline
metadata:
  name: kvm-new-failover-reservation
spec:
  schedulingDomain: nova
  description: |
    This pipeline is used by the failover reservation controller to find a host
    for creating a new failover reservation. It validates host compatibility AND
    checks capacity.

    Note: Domain filtering (filter_external_customer) is not applied for failover
    reservations because domains are currently not considered in failover scheduling.

    This is the pipeline used for KVM hypervisors (qemu and cloud-hypervisor).
