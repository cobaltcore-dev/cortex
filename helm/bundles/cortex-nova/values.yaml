owner-info:
  enabled: true
  helm-chart-url: "https://github.com/cobaltcore-dev/cortex/helm/bundles/cortex-nova"
  maintainers:
    - "arno.uhlig@sap.com"
    - "julius.clausnitzer@sap.com"
    - "malte.viering@sap.com"
    - "marcel.gute@sap.com"
    - "markus.wieland@sap.com"
    - "p.matthes@sap.com"
  support-group: "workload-management"
  service: "cortex-nova"

alerts:
  enabled: true
  prometheus: openstack

serviceMonitor:
  extraLabels: {}

# SSO certificate to use.
sharedSSOCert: &sharedSSOCert
  # Certificate "public key". (Optional, remove this key if not needed)
  cert: |
    -----BEGIN CERTIFICATE-----
    Your certificate here
    -----END CERTIFICATE-----
  # Certificate private key. (Optional, remove this key if not needed)
  key: |
    -----BEGIN PRIVATE KEY-----
    Your private key here
    -----END PRIVATE KEY-----
  # Whether the certificate is self-signed.
  # If true, the certificate is not verified.
  selfSigned: "false"

postgres:
  host: cortex-nova-postgresql-v18
  user: postgres
  password: secret
  database: postgres
  port: "5432"

prometheus:
  url: "https://path-to-your-prometheus"
  sso:
    enabled: false
    <<: *sharedSSOCert

openstack:
  url: "https://path-to-keystone/v3"
  availability: public
  username: openstack-user-with-all-project-read-access
  password: openstack-user-password
  projectName: openstack-project-of-user
  userDomainName: openstack-domain-of-user
  projectDomainName: openstack-domain-of-project-scoped-to
  sso:
    enabled: false
    <<: *sharedSSOCert

kvm:
  # Use this flag to enable/disable KVM host related features.
  enabled: false

cortex: &cortex
  crd: {enable: false}
  # Disable the default ServiceMonitor and metrics service from the kubebuilder stack.
  # A centralized ServiceMonitor and metrics service are defined in the cortex-nova chart.
  metrics: {enable: false}
  prometheus: {enable: false}
  conf: &cortexConf
    schedulingDomain: nova
    apiservers:
      home:
        gvks:
          - cortex.cloud/v1alpha1/Decision
          - cortex.cloud/v1alpha1/DecisionList
          - cortex.cloud/v1alpha1/History
          - cortex.cloud/v1alpha1/HistoryList
          - cortex.cloud/v1alpha1/Descheduling
          - cortex.cloud/v1alpha1/DeschedulingList
          - cortex.cloud/v1alpha1/Pipeline
          - cortex.cloud/v1alpha1/PipelineList
          - cortex.cloud/v1alpha1/Knowledge
          - cortex.cloud/v1alpha1/KnowledgeList
          - cortex.cloud/v1alpha1/Datasource
          - cortex.cloud/v1alpha1/DatasourceList
          - cortex.cloud/v1alpha1/KPI
          - cortex.cloud/v1alpha1/KPIList
          - cortex.cloud/v1alpha1/Reservation
          - cortex.cloud/v1alpha1/ReservationList
          - cortex.cloud/v1alpha1/CommittedResource
          - cortex.cloud/v1alpha1/CommittedResourceList
          - cortex.cloud/v1alpha1/ProjectQuota
          - cortex.cloud/v1alpha1/ProjectQuotaList
          - cortex.cloud/v1alpha1/FlavorGroupCapacity
          - cortex.cloud/v1alpha1/FlavorGroupCapacityList
          - kvm.cloud.sap/v1/Hypervisor
          - kvm.cloud.sap/v1/HypervisorList
          - v1/Secret
    keystoneSecretRef:
      name: cortex-nova-openstack-keystone
      namespace: default

    # ssoSecretRef:
    #   name: cortex-nova-openstack-sso
    #   namespace: default
    monitoring:
      labels: &cortexMonitoringLabels
        github_org: cobaltcore-dev
        github_repo: cortex

# Split deployments
cortex-scheduling-controllers:
  <<: *cortex
  namePrefix: cortex-nova-scheduling
  # Enable webhook that will validate CRDs for the scheduling controllers.
  webhook: {enable: true}
  certmanager: {enable: true} # Needed for the webhook TLS certificates.
  conf:
    <<: *cortexConf
    leaderElectionID: cortex-nova-scheduling
    monitoring:
      labels:
        <<: *cortexMonitoringLabels
        component: nova-scheduling
    enabledControllers:
      - nova-pipeline-controllers
      - nova-deschedulings-executor
      - hypervisor-overcommit-controller
      - committed-resource-reservations-controller
      - failover-reservations-controller
      - quota-controller
      - capacity-controller
    enabledTasks:
      - nova-history-cleanup-task
      - commitments-sync-task  # required for committed resources
    # Feature gates control optional capabilities within running components.
    # To enable committed resources, all three must be set:
    #   enabledControllers must include committed-resource-reservations-controller (above)
    #   enabledTasks must include commitments-sync-task (above)
    #   featureGates.committedResourceTracking must be true (below)
    featureGates:
      # Enables VM allocation write-back into Reservation slots and no-host-found
      # classification by committed resource coverage. Enable only on deployments
      # that use committed resources.
      committedResourceTracking: false
      # Enables pessimistic blocking: all candidate hosts are blocked at scheduling
      # time to prevent concurrent placements from violating capacity constraints.
      # Enable only on deployments that support pessimistic blocking.
      pessimisticBlocking: false
    # Pipeline used for the empty-state capacity probe (ignores allocations and reservations).
    capacityTotalPipeline: "kvm-report-capacity"
    # Pipeline used for the current-state capacity probe (considers current VM allocations).
    capacityPlaceablePipeline: "kvm-general-purpose-load-balancing"
    # How often the capacity controller re-runs its scheduler probes.
    capacityReconcileInterval: 5m
    # If true, the external scheduler API will limit the list of hosts in its
    # response to those included in the scheduling request.
    novaLimitHostsToRequest: true
    # Number of top hosts to shuffle for evacuation requests.
    # Set to 0 or negative to disable shuffling.
    evacuationShuffleK: 3
    committedResourceReservationController:
      # Maps flavor group IDs to pipeline names; "*" acts as catch-all fallback
      flavorGroupPipelines:
        "2152": "kvm-hana-bin-packing"  # HANA flavor group
        "2101": "kvm-general-purpose-load-balancing"  # General Purpose flavor group
        "*": "kvm-general-purpose-load-balancing"  # Catch-all fallback
      # Fallback pipeline when no flavorGroupPipelines entry matches
      pipelineDefault: "kvm-general-purpose-load-balancing"
      # How often to re-verify active Reservation CRDs (healthy state)
      requeueIntervalActive: "5m"
      # Back-off interval when knowledge is unavailable
      requeueIntervalRetry: "1m"
      # Back-off interval while a VM allocation is still within allocationGracePeriod
      requeueIntervalGracePeriod: "1m"
      # How long after a VM is allocated to a reservation before it is expected to appear
      # on the target host; allocations not confirmed within this window are removed
      allocationGracePeriod: "15m"
      # URL of the nova external scheduler API for placement decisions
      schedulerURL: "http://localhost:8080/scheduler/nova/external"
    committedResourceController:
      # Back-off interval while CommittedResource placement is pending or failed (base for exponential backoff)
      requeueIntervalRetry: "1m"
      # Maximum back-off interval cap for the exponential retry delay
      maxRequeueInterval: "30m"
    committedResourceAPI:
      # Timeout for watching CommittedResource CRDs before rolling back
      watchTimeout: "15s"
      # How often to poll CommittedResource CRD conditions during watch
      watchPollInterval: "500ms"
      # When false, the endpoint returns HTTP 503; the info endpoint remains available.
      enableChangeCommitments: true
      # When false, the endpoint returns HTTP 503.
      enableReportUsage: true
      # When false, the endpoint returns HTTP 503.
      enableReportCapacity: true
      # Whether the quota API endpoint is active
      # When false, the endpoint returns HTTP 503.
      enableQuota: true
      # Maps flavor group IDs to resource flag configs; "*" acts as catch-all.
      # Controls handlesCommitments, hasCapacity, hasQuota per resource type for each group.
      flavorGroupResourceConfig:
        "*":              # catch-all (unknown groups)
          ram:
            handlesCommitments: false
            hasCapacity: true
            hasQuota: false
          cores:
            handlesCommitments: false
            hasCapacity: true
            hasQuota: false
          instances:
            handlesCommitments: false
            hasCapacity: true
            hasQuota: false
    committedResourceUsageReconciler:
      # Minimum time between usage reconcile runs for the same CommittedResource.
      # Also acts as the periodic fallback interval: a successful reconcile schedules
      # the next run after this duration, so this is also the maximum status staleness.
      cooldownInterval: "5m"
    # OvercommitMappings is a list of mappings that map hypervisor traits to
    # overcommit ratios. Note that this list is applied in order, so if there
    # are multiple mappings applying to the same hypervisors, the last mapping
    # in this list will override the previous ones.
    overcommitMappings: []
    # Failover reservations controller configuration
    # Name of the Datasource CRD that provides database connection info for Nova VM data
    datasourceName: nova-servers
    # URL of the nova external scheduler API for placement decisions (used by failover controller)
    schedulerURL: "http://localhost:8080/scheduler/nova/external"
    # Maps flavor name patterns (glob) to required failover count
    # Example: {"hana_*": 2, "m1.xlarge": 1}
    flavorFailoverRequirements:
      "*": 2
    # How often to check for missing failover reservations (periodic bulk reconciliation)
    reconcileInterval: 5m
    # Used when maxVMsToProcess limits processing, allows faster catch-up and for the first reconcile
    shortReconcileInterval: 1m
    # Number of max VMs to process in one periodic reconciliation loop
    maxVMsToProcess: 50
    # How often to rotate VM selection offset when maxVMsToProcess limits processing
    # Every N reconcile cycles, the offset rotates to process different VMs
    vmSelectionRotationInterval: 3
    # Minimum successful reservations to use short interval
    minSuccessForShortInterval: 0
    # Maximum failures allowed to still use short interval
    maxFailuresForShortInterval: 99
    # If true, uses hypervisor CRD as source of truth for VM location instead of postgres
    trustHypervisorLocation: true
    # How often to re-validate acknowledged failover reservations
    revalidationInterval: 30m
    # Prevents creating multiple new reservations on the same hypervisor per cycle
    limitOneNewReservationPerHypervisor: false
    # Size failover reservations based on LargestFlavor in the flavor group
    useFlavorGroupResources: false
    # How often the commitments syncer reconciles Limes commitments to Reservation CRDs
    committedResourceSyncInterval: "1h"

cortex-knowledge-controllers:
  <<: *cortex
  namePrefix: cortex-nova-knowledge
  conf:
    <<: *cortexConf
    leaderElectionID: cortex-nova-knowledge
    monitoring:
      labels:
        <<: *cortexMonitoringLabels
        component: nova-knowledge
    enabledControllers:
      - datasource-controllers
      - knowledge-controllers
      - kpis-controller
    enabledTasks: []

# Custom configuration for the cortex postgres chart.
cortex-postgres:
  fullnameOverride: cortex-nova-postgresql
  major: "18"
