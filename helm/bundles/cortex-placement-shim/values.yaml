owner-info:
  enabled: true
  helm-chart-url: "https://github.com/cobaltcore-dev/cortex/helm/bundles/cortex-placement-shim"
  maintainers:
    - "arno.uhlig@sap.com"
    - "julius.clausnitzer@sap.com"
    - "malte.viering@sap.com"
    - "marcel.gute@sap.com"
    - "markus.wieland@sap.com"
    - "p.matthes@sap.com"
  support-group: "workload-management"
  service: "cortex-placement-shim"

alerts:
  enabled: true
  prometheus: openstack

cortex-shim:
  namePrefix: cortex-placement
  prometheus:
    extraLabels:
      prometheus: openstack
  deployment:
    container:
      extraArgs: ["--placement-shim=true"]
  conf:
    # placementURL is the URL of the OpenStack Placement service toward
    # which the shim will proxy requests.
    placementURL:
    # keystoneURL is the URL of the OpenStack Keystone identity service,
    # used by the auth middleware for token introspection and by E2E tests
    # for authentication.
    keystoneURL:
    # OpenStack credentials used by the auth middleware for Keystone token
    # introspection and by the E2E test suite to obtain authenticated tokens.
    osUsername:
    osPassword:
    osProjectName:
    osUserDomainName:
    osProjectDomainName:
    features:
      enableResourceProviders: false
    auth:
      tokenCacheTTL: "5m"
      policies:
        - pattern: "GET /"
          roles: null # Version endpoint is publicly accessible (no token required).
        - pattern: "GET /usages"
          roles:
            - name: cloud_compute_admin
            - name: cloud_compute_viewer
            - name: compute_admin
              projectScope:
                from: query
            - name: compute_viewer
              projectScope:
                from: query
        - pattern: "GET /*"
          roles:
            - name: cloud_compute_admin
            - name: cloud_compute_viewer
        - pattern: "* /*"
          roles:
            - name: cloud_compute_admin
    e2e:
      svcURL: "http://cortex-placement-shim-service:8080"
    apiservers:
      home:
        gvks:
          - kvm.cloud.sap/v1/Hypervisor
          - kvm.cloud.sap/v1/HypervisorList
    monitoring:
      labels:
        github_org: cobaltcore-dev
        github_repo: cortex
    # Uncomment and set the following values to enable SSO for the placement
    # shim. The shim will use the provided SSO credentials to talk to openstack
    # over ingress.
    # sso:
    #   cert: |
    #     -----BEGIN CERTIFICATE-----
    #     Your certificate here
    #     -----END CERTIFICATE-----
    #   certKey: |
    #     -----BEGIN PRIVATE KEY-----
    #     Your private key here
    #     -----END PRIVATE KEY-----
    #   selfSigned: "false"
