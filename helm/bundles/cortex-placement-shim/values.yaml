owner-info:
  enabled: true
  helm-chart-url: "https://github.com/cobaltcore-dev/cortex/helm/bundles/cortex-placement-shim"
  maintainers:
    - "arno.uhlig@sap.com"
    - "julius.clausnitzer@sap.com"
    - "malte.viering@sap.com"
    - "marcel.gute@sap.com"
    - "markus.wieland@sap.com"
    - "p.matthes@sap.com"
  support-group: "workload-management"
  service: "cortex-placement-shim"

alerts:
  enabled: true
  prometheus: openstack

cortex-shim:
  namePrefix: cortex-placement
  prometheus:
    extraLabels:
      prometheus: openstack
  deployment:
    container:
      extraArgs: ["--placement-shim=true"]
  conf:
    e2e:
      svcURL: "http://cortex-placement-shim-service:8080"
      # Openstack credentials for e2e tests. These are not used by the shim
      # itself, but are passed to the e2e test suite to generate an authenticated
      # openstack client token for testing the shim's integration with openstack.
      osKeystoneURL:
      osUsername:
      osPassword:
      osProjectName:
      osUserDomainName:
      osProjectDomainName:
    apiservers:
      home:
        gvks:
          - kvm.cloud.sap/v1/Hypervisor
          - kvm.cloud.sap/v1/HypervisorList
    monitoring:
      labels:
        github_org: cobaltcore-dev
        github_repo: cortex
    # Uncomment and set the following values to enable SSO for the placement
    # shim. The shim will use the provided SSO credentials to talk to openstack
    # over ingress.
    # sso:
    #   cert: |
    #     -----BEGIN CERTIFICATE-----
    #     Your certificate here
    #     -----END CERTIFICATE-----
    #   certKey: |
    #     -----BEGIN PRIVATE KEY-----
    #     Your private key here
    #     -----END PRIVATE KEY-----
    #   selfSigned: "false"
