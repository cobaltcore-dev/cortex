name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    runs-on: [self-hosted, solinas]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-claude-code-action

      - uses: ./.claude-code-action
        with:
          trigger_phrase: "@claude-code"
          use_litellm: "true"
          litellm_model: "sap/anthropic--claude-4.6-sonnet"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: "true"
          path_to_bun_executable: ${{ env.HOME }}/.bun/bin/bun
        env:
          AICORE_AUTH_URL: ${{ vars.AICORE_AUTH_URL }}
          AICORE_BASE_URL: ${{ vars.AICORE_BASE_URL }}
          AICORE_CLIENT_ID: ${{ vars.AICORE_CLIENT_ID }}
          AICORE_CLIENT_SECRET: ${{ secrets.AICORE_CLIENT_SECRET }}
