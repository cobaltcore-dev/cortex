name: Claude Code Weekly Bug Hunter

on:
  schedule:
    - cron: "0 6 * * 1"  # 06:00 UTC every Monday
  workflow_dispatch:      # allow manual trigger for testing

jobs:
  bug-hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-claude-code-action

      - name: Load bug hunter prompt
        id: prompt
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> "$GITHUB_OUTPUT"
          cat .github/agents/bug-hunter.md >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/start-litellm-proxy
        env:
          AICORE_RESOURCE_GROUP: ${{ secrets.AICORE_RESOURCE_GROUP }}
          AICORE_BASE_URL: ${{ secrets.AICORE_BASE_URL }}
          AICORE_AUTH_URL: ${{ secrets.AICORE_AUTH_URL }}
          AICORE_CLIENT_ID: ${{ secrets.AICORE_CLIENT_ID }}
          AICORE_CLIENT_SECRET: ${{ secrets.AICORE_CLIENT_SECRET }}

      - uses: ./.claude-code-action
        with:
          use_litellm: "true"
          litellm_model: "sap/anthropic--claude-4.6-sonnet"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: "true"
          prompt: |
            ${{ steps.prompt.outputs.content }}

      - uses: ./.github/actions/stop-litellm-proxy
        if: always()
