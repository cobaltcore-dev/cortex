name: Update Helm AppVersion

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
  schedule:
    # Safety net: catches anything missed by workflow_run (e.g. failed runs that
    # later succeed via re-run, or charts whose images were promoted out-of-band).
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: read

# Serialize runs across all triggers so concurrent invocations don't race on
# the shared PR branch.
concurrency:
  group: update-appversion
  cancel-in-progress: false

jobs:
  update-appversion:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Bump chart appVersions to match GHCR latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          {
            .github/scripts/bump-chart.sh helm/library/cortex          cortex
            .github/scripts/bump-chart.sh helm/library/cortex-shim     cortex-shim
            .github/scripts/bump-chart.sh helm/library/cortex-postgres cortex-postgres
          } | tee /tmp/bump.log

      - name: Summarize bump
        id: summary
        run: |
          set -euo pipefail
          if grep -q '^bumped' /tmp/bump.log; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "log<<EOF"
            cat /tmp/bump.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update Pull Request
        if: steps.summary.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ci/bump-chart-appversions
          delete-branch: true
          add-paths: helm/library/*/Chart.yaml
          commit-message: |
            bump app version [skip ci]

            ${{ steps.summary.outputs.log }}
          title: bump app version [skip ci]
          body: |
            bump app version [skip ci]

            ```
            ${{ steps.summary.outputs.log }}
            ```
