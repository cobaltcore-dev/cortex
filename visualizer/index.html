<!DOCTYPE html>
<html>
  <head>
    <title>Cortex visualizer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: rgb(248, 248, 250);
    }

    .vmdescription {
      position: fixed;
      margin: 1em;
      padding: 0.5em;
      top: 0;
      left: 0;
      right: 0;
      background: rgb(255, 255, 255);
      border-radius: 0.5em;
    }

    .pill {
      display: inline-block;
      padding: 0.5em;
      margin: 0.5em;
      background: rgb(255, 165, 2);
      color: white;
      border-radius: 0.5em;
      font-weight: bold;
    }

    .container {
      /* Space for the VM description */
      padding-top: 5em;
    }

    td.weight {
      text-align: center;
      position: relative;
      div {
        border-radius: 0.5em;
        padding: 0.5em;
        margin: 0.5em;
        border: 2px solid rgb(241, 242, 246);
      }
      /* Vertical line through the weight cells */
      ::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 0;
        border-left: 2px dotted rgb(206, 214, 224);
        transform: translateX(-50%);
        z-index: -2;
      }
      /* Backdrop white for the weight cells */
      ::after {
        content: '';
        position: absolute;
        top: 0.6em;
        bottom: 0.6em;
        left: 0.6em;
        right: 0.6em;
        border-radius: 0.5em;
        background: white;
        z-index: -1;
      }
    }

    th.hostname {
      text-align: center;
      div {
        position: relative;
        padding: 0.5em;
        background: rgb(255, 255, 255);
        border-radius: 0.5em;
        margin: 0.5em;
        /* Badge for hypervisor down */
        p.down {
          background: rgb(255, 71, 87);
          color: white;
          padding: 0.5em;
          border-radius: 0.5em;
          position: absolute;
          top: -1.8em;
          right: -0.8em;
          font-size: 0.8em;
        }
      }
    }

    th.stepname, td.stepname {
      font-weight: bold;
      text-align: left;
      padding-right: 1em;
    }

    tr.highlight td.weight {
      padding-top: 1em;
      padding-bottom: 1em;
      div {
        margin-right: 1.5em;
        margin-left: 1.5em;
      }
      ::after {
        top: 1.5em;
        bottom: 1.5em;
        left: 1.5em;
        right: 1.5em;
      }
    }

    td.chart {
      position: relative;
      height: 18em;
      div.barsbefore, div.barsafter, div.backdrop, div.stats {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        margin-top: 0.5em;
        margin-bottom: 0.5em;
        padding-left: 0.5em;
        padding-right: 0.5em;
        flex-direction: row;
        justify-content: center;
        align-items: flex-end;
        p {
          margin-left: 0.1em;
          margin-right: 0.1em;
          width: 30%;
          display: flex;
          border-radius: 0.2em;
        }
      }
      div.backdrop {
        p {
          height: 100%;
          background: rgb(241, 242, 246);
        }
      }
      div.barsafter {
        p.cpu { background: rgb(255, 165, 2); }
        p.mem { background: rgb(255, 165, 2); }
        p.disk { background: rgb(255, 165, 2); }
      }
      div.barsbefore {
        p.cpu { background: rgb(112, 161, 255); }
        p.mem { background: rgb(112, 161, 255); }
        p.disk { background: rgb(112, 161, 255); }
      }
      div.stats {
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        p {
          writing-mode: vertical-lr;
          text-orientation: mixed;
          width: 30%;
          display: flex;
          font-size: 1em;
          font-weight: bold;
          margin-left: 0.1em;
          margin-right: 0.1em;
          color: #4a4a4a;
          mix-blend-mode: color-burn;
          justify-content: center;
          align-items: center;
        }
      }
    }
  </style>

  <section id="app"></section>

  <script>
    let state = {
      pipeline: {},
      hypervisors: {},
    }

    const client = mqtt.connect('ws://localhost:8004/mqtt', {
      username: 'cortex',
      password: 'cortex',
      protocolVersion: 4,
    })
    client.on('message', (topic, message) => {
      if (topic === 'cortex/scheduler/pipeline/finished') {
        state.pipeline = JSON.parse(message.toString())
      }
      if (topic === 'cortex/sync/openstack/nova/hypervisors') {
        state.hypervisors = JSON.parse(message.toString())
      }
      redraw()
    })
    client.on('connect', () => {
      console.log('Connected to MQTT broker.')
      client.subscribe('cortex/scheduler/pipeline/finished')
      client.subscribe('cortex/sync/openstack/nova/hypervisors')
    })

    redraw = async () => {
      if (Object.keys(state.pipeline).length === 0) return
      if (Object.keys(state.hypervisors).length === 0) return

      const spec = state.pipeline.request.spec["nova_object.data"]
      const flavor = spec.flavor["nova_object.data"]

      // Get the hypervisors by service host.
      hypervisors = {}
      for (const hypervisor of state.hypervisors) {
        hypervisors[hypervisor.service.host] = hypervisor
      }
      const hostnames = Object.keys(hypervisors).sort((a, b) => {
        if (!state.pipeline.in[a]) return 1
        if (!state.pipeline.in[b]) return -1
        return state.pipeline.out[b] - state.pipeline.out[a]
      })

      // Also include the nova input weights, scaled weights, and output weights.
      steps = {
        ...state.pipeline.steps,
        'nova input': state.pipeline.request.weights,
        'scaled weights': state.pipeline.in,
        'output weights': state.pipeline.out,
      }
      order = ['nova input', 'scaled weights', ...state.pipeline.order, 'output weights']
      highlights = ['nova input', 'output weights']

      let table = '<table>'
      // Add weights to the table.
      for (const stepname of order) {
        const weights = steps[stepname]
        table += `<tr class="${highlights.includes(stepname) ? 'highlight' : ''}">`
        for (const host of hostnames) {
          if (weights[host] === undefined) {
            table += '<td class="weight"></td>'
            continue
          }
          const weight = weights[host]
          const norm = Math.min(1, Math.max(0, (weight + 1) / 2))
          let bg = `rgba(255, 71, 87, ${1 - (norm * 2)})`
          if (weight >= 0) {
            bg = `rgba(46, 213, 115, ${(norm * 2) - 1})`
          }
          let color = norm > 0.75 || norm < 0.25 ? 'white' : 'black'
          table += `
            <td class="weight">
              <div
                style="background: ${bg}; color: ${color}"
              >${weight.toFixed(2)}</div>
            </td>
          `
        }
        table += `<td class="stepname">${stepname}</td>`
        table += '</tr>'
      }
      // Add hosts to the table.
      table += '<tr>'
      for (const host of hostnames) {
        isDown = hypervisors[host].state === 'down'
        table += '<th class="hostname">'
        if (isDown) {
          table += `<div><p class="down">Down</p>${host}</div>`
        } else {
          table += `<div>${host}</div>`
        }
        table += '</th>'
      }
      table += '</tr>'
      // Add hypervisor statistics to the table.
      table += '<tr>'
      for (const host of hostnames) {
        const hypervisor = hypervisors[host]
        const cpusUsed = hypervisor.vcpus == 0 ? 0 : (hypervisor.vcpus_used / hypervisor.vcpus)
        const cpusUsedAfter = hypervisor.vcpus == 0 ? 0 :
          ((hypervisor.vcpus_used + flavor.vcpus) / hypervisor.vcpus)
        const memUsed = hypervisor.memory_mb == 0 ? 0 : (hypervisor.memory_mb_used / hypervisor.memory_mb)
        const memUsedAfter = hypervisor.memory_mb == 0 ? 0 :
          ((hypervisor.memory_mb_used + flavor.memory_mb) / hypervisor.memory_mb)
        const diskUsed = hypervisor.local_gb == 0 ? 0 : (hypervisor.local_gb_used / hypervisor.local_gb)
        const diskUsedAfter = hypervisor.local_gb == 0 ? 0 :
          ((hypervisor.local_gb_used + flavor.disk) / hypervisor.local_gb)
        table += `
          <td class="chart">
            <div class="backdrop">
              <p class="cpu"></p>
              <p class="mem"></p>
              <p class="disk"></p>
            </div>
            <div class="barsafter">
              <p class="cpu" style="height: ${Math.min(100, cpusUsedAfter * 100)}%"></p>
              <p class="mem" style="height: ${Math.min(100, memUsedAfter * 100)}%"></p>
              <p class="disk" style="height: ${Math.min(100, diskUsedAfter * 100)}%"></p>
            </div>
            <div class="barsbefore">
              <p class="cpu" style="height: ${Math.min(100, cpusUsed * 100)}%"></p>
              <p class="mem" style="height: ${Math.min(100, memUsed * 100)}%"></p>
              <p class="disk" style="height: ${Math.min(100, diskUsed * 100)}%"></p>
            </div>
            <div class="stats">
              <p>${hypervisor.vcpus_used} / ${hypervisor.vcpus} vCPUs</p>
              <p>${Math.round(hypervisor.memory_mb_used / 1000)} / ${Math.round(hypervisor.memory_mb / 1000)} GB MEM</p>
              <p>${hypervisor.local_gb_used} / ${hypervisor.local_gb} GB</p>
            </div>
          </td>
        `
      }
      table += '</tr>'

      const vmdescription = `
        <div class="vmdescription">
          <p class="pill">VMware: ${state.pipeline.request.vmware}</p>
          <p class="pill">Live Migration: ${state.pipeline.request.live}</p>
          <p class="pill">Resize: ${state.pipeline.request.live}</p>
          <p class="pill">Availability Zone: ${spec.availability_zone}</p>
          <p class="pill">Flavor: ${flavor.name} (MB: ${flavor.memory_mb}, vCPUs: ${flavor.vcpus})</p>
        </div>
      `

      document.body.innerHTML = `
        <div class="container">
          ${table}
          ${vmdescription}
        </div>
      `
    }
  </script>
</html>
