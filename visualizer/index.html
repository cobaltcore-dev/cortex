<!DOCTYPE html>
<html>
  <head>
    <title>Cortex visualizer</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: rgb(248, 248, 250);
    }

    .vmdescription {
      position: fixed;
      margin: 1em;
      padding: 0.5em;
      top: 0;
      left: 0;
      right: 0;
      background: rgb(255, 255, 255);
      border-radius: 0.5em;
    }

    .pill {
      display: inline-block;
      padding: 0.5em;
      margin: 0.5em;
      background: rgb(223, 228, 234);
      border-radius: 0.5em;
      font-weight: bold;
    }

    .container {
      /* Space for the VM description */
      padding-top: 5em;
    }

    td.weight {
      text-align: center;
      position: relative;
      div {
        border-radius: 0.5em;
        padding: 0.5em;
        margin: 0.5em;
        border: 2px solid rgb(241, 242, 246);
      }
      /* Vertical line through the weight cells */
      ::before {
        content: '';
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 0;
        border-left: 2px dotted rgb(206, 214, 224);
        transform: translateX(-50%);
        z-index: -2;
      }
      /* Backdrop white for the weight cells */
      ::after {
        content: '';
        position: absolute;
        top: 0.6em;
        bottom: 0.6em;
        left: 0.6em;
        right: 0.6em;
        border-radius: 0.5em;
        background: white;
        z-index: -1;
      }
    }

    th.hostname {
      text-align: center;
      div {
        padding: 0.5em;
        background: rgb(255, 255, 255);
        border-radius: 0.5em;
        margin: 0.5em;
      }
    }

    th.stepname, td.stepname {
      font-weight: bold;
      text-align: left;
      padding-right: 1em;
    }

    tr.highlight td.weight {
      padding-top: 1em;
      padding-bottom: 1em;
      div {
        margin-right: 1.5em;
        margin-left: 1.5em;
      }
      ::after {
        top: 1.5em;
        bottom: 1.5em;
        left: 1.5em;
        right: 1.5em;
      }
    }
  </style>

  <section id="app"></section>

  <script>
    const client = mqtt.connect('ws://localhost:8004/mqtt', {
      username: 'cortex',
      password: 'cortex',
      protocolVersion: 4,
    })
    client.on('message', (topic, message) => {
      if (topic === 'cortex/scheduler/pipeline/finished') {
        onSchedulerPipelineFinished(JSON.parse(message.toString()))
      }
    })
    client.on('connect', () => {
      console.log('Connected to MQTT broker.')
      client.subscribe('cortex/scheduler/pipeline/finished')
    })
    onSchedulerPipelineFinished = async (data) => {
      let hosts = []
      for (const host of data.request.hosts) {
        hosts.push(host.host) // Host name.
      }
      // Order by their output weights.
      hosts.sort((a, b) => data.out[b] - data.out[a])
      // Also include the nova input weights, scaled weights, and output weights.
      steps = {
        ...data.steps,
        'nova input': data.request.weights,
        'scaled weights': data.in,
        'output weights': data.out,
      }
      order = ['nova input', 'scaled weights', ...data.order, 'output weights']
      highlights = ['nova input', 'output weights']

      // Display the weights table.
      let table = '<table class="weights">'
      for (const stepname of order) {
        const weights = steps[stepname]
        table += `<tr class="${highlights.includes(stepname) ? 'highlight' : ''}">`
        for (const host of hosts) {
          const weight = weights[host]
          const norm = Math.min(1, Math.max(0, (weight + 1) / 2))
          let bg = `rgba(255, 71, 87, ${1 - (norm * 2)})`
          if (weight >= 0) {
            bg = `rgba(46, 213, 115, ${(norm * 2) - 1})`
          }
          let color = norm > 0.75 || norm < 0.25 ? 'white' : 'black'
          table += `
            <td class="weight">
              <div
                style="background: ${bg}; color: ${color}"
              >${weight.toFixed(2)}</div>
            </td>
          `
        }
        table += `<td class="stepname">${stepname}</td>`
        table += '</tr>'
      }
      for (const host of hosts) {
        table += `<th class="hostname"><div>${host}</div></th>`
      }
      table += '</tr>'
      table += '</table>'

      const spec = data.request.spec["nova_object.data"]
      const flavor = spec.flavor["nova_object.data"]
      const vmdescription = `
        <div class="vmdescription">
          <p class="pill">VMware: ${data.request.vmware}</p>
          <p class="pill">Live Migration: ${data.request.live}</p>
          <p class="pill">Resize: ${data.request.live}</p>
          <p class="pill">Availability Zone: ${spec.availability_zone}</p>
          <p class="pill">Flavor: ${flavor.name} (MB: ${flavor.memory_mb}, vCPUs: ${flavor.vcpus})</p>
        </div>
      `

      document.body.innerHTML = `
        <div class="container">
          ${table}
          ${vmdescription}
        </div>
      `
    }
  </script>
</html>
