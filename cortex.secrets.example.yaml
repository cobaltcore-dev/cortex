# Override config values for local development. This includes secrets,
# environment-specific settings, and logging configuration.
# These values can be used in the Tiltfile.

# SSO certificate to use.
sharedSSOCert: &sharedSSOCert
  # Certificate "public key". (Optional, remove this key if not needed)
  cert: |
    -----BEGIN CERTIFICATE-----
    Your certificate here
    -----END CERTIFICATE-----
  # Certificate private key. (Optional, remove this key if not needed)
  key: |
    -----BEGIN PRIVATE KEY-----
    Your private key here
    -----END PRIVATE KEY
  # Whether the certificate is self-signed.
  # If true, the certificate is not verified.
  selfSigned: "false"

# Logging configuration for local development.
# Set logLevel to "debug" for verbose output from both zap and slog loggers.
# Set zapDevel to true for human-readable console logs instead of JSON.
# These apply per sub-chart, e.g. for cortex-nova:
#
# cortex-scheduling-controllers:
#   controllerManager:
#     container:
#       logLevel: "debug"
#       zapDevel: true
#
# cortex-knowledge-controllers:
#   controllerManager:
#     container:
#       logLevel: "debug"
#       zapDevel: true

# Enable kvm pipelines and scheduling support.
kvm:
  enabled: true

prometheus:
  url: "https://path-to-your-prometheus"
  sso:
    enabled: false
    <<: *sharedSSOCert

openstack:
  url: https://path-to-keystone/v3
  availability: public
  username: openstack-user-with-all-project-read-access
  password: openstack-user-password
  projectName: openstack-project-of-user
  userDomainName: openstack-domain-of-user
  projectDomainName: openstack-domain-of-project-scoped-to
  sso:
    enabled: false
    <<: *sharedSSOCert
